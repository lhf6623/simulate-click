<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif;
      background: transparent;
      color: #fff;
      overflow: hidden;
      user-select: none;
    }
    .window {
      width: 280px;
      height: 310px;
      background: rgba(30, 20, 50, 0.25);
      backdrop-filter: blur(40px) saturate(1.8);
      -webkit-backdrop-filter: blur(40px) saturate(1.8);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.18);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    /* 标题栏 */
    .titlebar {
      height: 32px;
      display: flex;
      align-items: center;
      padding: 0 10px;
      -webkit-app-region: drag;
      flex-shrink: 0;
    }
    .titlebar-close {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #ff5f57;
      border: none;
      cursor: pointer;
      -webkit-app-region: no-drag;
      opacity: 0.85;
    }
    .titlebar-close:hover { opacity: 1; }
    .titlebar-title {
      flex: 1;
      text-align: center;
      font-size: 12px;
      font-weight: 500;
      color: rgba(255,255,255,0.7);
      margin-right: 12px;
    }
    /* 内容区 */
    .content {
      flex: 1;
      padding: 0 12px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow: hidden;
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
      display: inline-block;
      margin-right: 4px;
    }
    .status-dot.running { background: #4ade80; box-shadow: 0 0 6px #4ade80; }
    .card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 10px;
    }
    .card-label {
      font-size: 10px;
      color: rgba(255,255,255,0.45);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
    }
    .card-label .status-wrap {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 3px;
      font-size: 10px;
      color: rgba(255,255,255,0.5);
      text-transform: none;
    }
    .row {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .input {
      flex: 1;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      padding: 5px 8px;
      font-size: 12px;
      color: #fff;
      outline: none;
      min-width: 0;
    }
    .input:focus {
      border-color: rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.12);
    }
    .input::placeholder { color: rgba(255,255,255,0.25); }
    /* 隐藏数字输入框的上下箭头 */
    input[type=number]::-webkit-outer-spin-button,
    input[type=number]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type=number] { -moz-appearance: textfield; }
    .mini-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 11px;
      color: rgba(255,255,255,0.8);
      cursor: pointer;
      white-space: nowrap;
      width: 60px;
      transition: background 0.15s;
    }
    .mini-btn:hover { background: rgba(255,255,255,0.18); }
    .mini-btn.waiting {
      background: rgba(250,200,50,0.2);
      border-color: rgba(250,200,50,0.3);
      color: #fbbf24;
    }
    /* 开始按钮 */
    .action-btn {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .action-btn.start {
      background: linear-gradient(135deg, rgba(120,200,120,0.5), rgba(60,160,80,0.6));
      color: #fff;
      border: 1px solid rgba(120,200,120,0.3);
    }
    .action-btn.start:hover { background: linear-gradient(135deg, rgba(120,200,120,0.6), rgba(60,160,80,0.7)); }
    .action-btn.stop {
      background: linear-gradient(135deg, rgba(240,80,80,0.5), rgba(200,50,50,0.6));
      color: #fff;
      border: 1px solid rgba(240,80,80,0.3);
    }
    .action-btn.stop:hover { background: linear-gradient(135deg, rgba(240,80,80,0.6), rgba(200,50,50,0.7)); }
    /* 权限警告 */
    .perm-bar {
      background: rgba(250,180,50,0.15);
      border: 1px solid rgba(250,180,50,0.2);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 10px;
      color: #fbbf24;
      display: none;
    }
    .perm-bar button {
      background: rgba(250,180,50,0.25);
      border: 1px solid rgba(250,180,50,0.3);
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 10px;
      color: #fbbf24;
      cursor: pointer;
      margin-left: 6px;
    }
    /* 计数器 */
    .counter {
      font-size: 10px;
      color: rgba(255,255,255,0.4);
      text-align: right;
    }
    .counter span { color: rgba(255,255,255,0.7); font-weight: 600; }
  </style>
</head>
<body>
  <div class="window">
    <div class="titlebar">
      <button class="titlebar-close" id="close-btn"></button>
      <span class="titlebar-title">模拟点击</span>
    </div>
    <div class="content">
      <div id="perm-bar" class="perm-bar">
        ⚠️ 需要辅助功能权限
        <button id="request-perm-btn">授予</button>
      </div>

      <div class="card">
        <div class="card-label">点击次数 (0为不限)<span class="status-wrap"><span id="status-dot" class="status-dot"></span><span id="status-label">空闲</span></span></div>
        <div class="row">
          <input type="number" id="count-limit" class="input" placeholder="次数" value="1" min="0">
        </div>
      </div>

      <div class="card">
        <div class="card-label">位置</div>
        <div class="row">
          <input type="number" id="pos-x" class="input" placeholder="X" value="0">
          <input type="number" id="pos-y" class="input" placeholder="Y" value="0">
          <button id="get-pos-btn" class="mini-btn">捕获</button>
        </div>
      </div>

      <div class="card">
        <div class="card-label">间隔 (毫秒)</div>
        <div class="row">
          <input type="number" id="min-delay" class="input" placeholder="最小" value="500" min="10">
          <span style="color:rgba(255,255,255,0.25);font-size:11px">~</span>
          <input type="number" id="max-delay" class="input" placeholder="最大" value="1500" min="10">
        </div>
      </div>

      <button id="start-btn" class="action-btn start">开始</button>
      <button id="stop-btn" class="action-btn stop" style="display:none">停止 (Esc)</button>

      <div class="counter" id="counter-row" style="display:none">已点击 <span id="count-display">0</span> 次</div>
    </div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    const posXInput = document.getElementById('pos-x');
    const posYInput = document.getElementById('pos-y');
    const getPosBtn = document.getElementById('get-pos-btn');
    const minDelayInput = document.getElementById('min-delay');
    const maxDelayInput = document.getElementById('max-delay');
    const countLimitInput = document.getElementById('count-limit');
    const startBtn = document.getElementById('start-btn');
    const stopBtn = document.getElementById('stop-btn');
    const statusDot = document.getElementById('status-dot');
    const statusLabel = document.getElementById('status-label');
    const counterRow = document.getElementById('counter-row');
    const countDisplay = document.getElementById('count-display');
    const permBar = document.getElementById('perm-bar');

    function updateConfig() {
      const countVal = parseInt(countLimitInput.value);
      ipcRenderer.send('update-config', {
        countLimit: isNaN(countVal) ? 1 : countVal,
        x: parseInt(posXInput.value) || 0,
        y: parseInt(posYInput.value) || 0,
        minDelay: parseInt(minDelayInput.value) || 500,
        maxDelay: parseInt(maxDelayInput.value) || 1500
      });
    }

    // 关闭按钮
    document.getElementById('close-btn').addEventListener('click', () => {
      ipcRenderer.send('close-window');
    });

    // 获取位置
    getPosBtn.addEventListener('click', () => {
      getPosBtn.textContent = '捕获中';
      getPosBtn.classList.add('waiting');
      ipcRenderer.send('start-capture-overlay');
    });

    ipcRenderer.on('mouse-pos', (e, pos) => {
      posXInput.value = pos.x;
      posYInput.value = pos.y;
      getPosBtn.textContent = '捕获';
      getPosBtn.classList.remove('waiting');
      updateConfig();
    });

    ipcRenderer.on('capture-cancelled', () => {
      getPosBtn.textContent = '捕获';
      getPosBtn.classList.remove('waiting');
    });

    // 开始/停止
    startBtn.addEventListener('click', () => { updateConfig(); ipcRenderer.send('start-click'); });
    stopBtn.addEventListener('click', () => { ipcRenderer.send('stop-click'); });

    ipcRenderer.on('click-started', () => {
      startBtn.style.display = 'none';
      stopBtn.style.display = 'block';
      statusDot.classList.add('running');
      statusLabel.textContent = '运行中';
      counterRow.style.display = 'block';
      countDisplay.textContent = '0';
      permBar.style.display = 'none';
    });

    ipcRenderer.on('click-stopped', (e, data) => {
      startBtn.style.display = 'block';
      stopBtn.style.display = 'none';
      statusDot.classList.remove('running');
      statusLabel.textContent = '空闲';
      if (data.reason === 'limit') {
        countDisplay.textContent = data.count;
      }
    });

    ipcRenderer.on('click-update', (e, count) => { countDisplay.textContent = count; });

    ipcRenderer.on('permission-status', (e, has) => {
      permBar.style.display = has ? 'none' : 'block';
    });

    document.getElementById('request-perm-btn').addEventListener('click', () => {
      ipcRenderer.send('request-permission');
    });

    [countLimitInput, posXInput, posYInput, minDelayInput, maxDelayInput].forEach(el => {
      el.addEventListener('change', updateConfig);
    });

    ipcRenderer.send('check-permission');
    updateConfig();
  </script>
</body>
</html>
